<!DOCTYPE html>
<html lang="">
<head>
    <meta charset="UTF-8">
    <script src="viz-global.js"></script>

    <style>
        html, body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            background: #e0e0e0;
        }
        #container {
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none;
        }
        svg {
            width: 100%;
            height: 100%;
            transform-origin: center center;
        }
    </style>
    <title></title>
</head>

<body>

<div id="container"></div>

<script>
    let scale = 1;
    let posX = 0;
    let posY = 0;

    let isDragging = false;
    let lastX = 0;
    let lastY = 0;

    function renderGraph(dot) {

        Viz.instance().then(viz => {
          const svg = viz.renderSVGElement(dot);

          document.getElementById("container").appendChild(svg);
          resetView();
        });
    }

    function applyTransform() {
        const svg = document.querySelector("svg");
        if (!svg) return;

        svg.style.transform =
            `translate(${posX}px, ${posY}px) scale(${scale})`;
    }

    function resetView() {
        scale = 1;
        posX = 0;
        posY = 0;
        applyTransform();
    }

    /* ================= ZOOM ================= */
    document.addEventListener("wheel", e => {
        e.preventDefault();

        if (e.deltaY < 0) scale *= 1.1;
        else scale *= 0.9;

        applyTransform();
    });

    /* ================= DRAG ================= */
    document.addEventListener("mousedown", e => {
        isDragging = true;
        lastX = e.clientX;
        lastY = e.clientY;
    });

    document.addEventListener("mouseup", () => {
        isDragging = false;
    });

    document.addEventListener("mousemove", e => {
        if (!isDragging) return;

        posX += e.clientX - lastX;
        posY += e.clientY - lastY;

        lastX = e.clientX;
        lastY = e.clientY;

        applyTransform();
    });

    /* ================= TOUCH (ANDROID) ================= */
    let lastDist = 0;

    document.addEventListener("touchstart", e => {
        if (e.touches.length === 1) {
            isDragging = true;
            lastX = e.touches[0].clientX;
            lastY = e.touches[0].clientY;
        } else if (e.touches.length === 2) {
            lastDist = getDistance(e);
        }
    });

    document.addEventListener("touchmove", e => {
        e.preventDefault();

        if (e.touches.length === 1 && isDragging) {
            posX += e.touches[0].clientX - lastX;
            posY += e.touches[0].clientY - lastY;

            lastX = e.touches[0].clientX;
            lastY = e.touches[0].clientY;

        } else if (e.touches.length === 2) {
            const newDist = getDistance(e);
            scale *= newDist / lastDist;
            lastDist = newDist;
        }

        applyTransform();
    });

    document.addEventListener("touchend", () => {
        isDragging = false;
    });

    function getDistance(e) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        return Math.sqrt(dx * dx + dy * dy);
    }
</script>

</body>
</html>
